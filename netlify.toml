[build]
  command = "pip install -r netlify/functions/requirements.txt"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.9"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["yt-dlp"]

[functions."download"]
  runtime = "python3.9"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200